<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN-01 // U-ECHO // STEALTH_v11</title>
    <style>
        :root {
            --m-acid: #dfff11; /* Signature Marathon Yellow-Green */
            --m-cobalt: #0011ff; /* Deep Tech Blue */
            --m-black: #05070a;
            --m-white: #f0f0f5;
            --m-border: #2a2d35;
            --m-alert: #ff3e00; /* Hazard Orange */
            --m-surface: rgba(10, 12, 16, 0.95);
        }

        body {
            background-color: var(--m-black);
            color: var(--m-white);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            background-image: 
                linear-gradient(90deg, rgba(223, 255, 17, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(223, 255, 17, 0.03) 1px, transparent 1px);
            background-size: 25px 25px;
            text-transform: uppercase;
        }

        /* Side Branding Decal */
        body::before {
            content: "RUNNER_OS // SEC_BANK_099";
            position: fixed; left: 10px; top: 50%;
            transform: rotate(-90deg) translateY(-50%);
            font-size: 0.6rem; font-weight: 900;
            letter-spacing: 4px; color: var(--m-acid); opacity: 0.4;
        }

        .terminal-container { 
            width: 100%; max-width: 780px; 
            border: 2px solid var(--m-border);
            background: var(--m-surface);
            position: relative;
            box-shadow: 15px 15px 0px rgba(0, 17, 255, 0.1);
        }

        /* Top Header - Clipped Shape */
        .sys-header { 
            background: var(--m-acid);
            color: var(--m-black);
            padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 98% 100%, 0 100%);
            margin-bottom: 0;
        }

        .welcome-text { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; }
        .status-line { font-family: monospace; font-size: 0.7rem; font-weight: bold; color: var(--m-black); opacity: 0.8; }

        .inner-border { padding: 30px; border: none; }

        /* Modules */
        .module { margin-bottom: 30px; }
        .module-title { 
            font-size: 0.75rem; font-weight: 900; 
            color: var(--m-acid); 
            border-left: 6px solid var(--m-cobalt);
            padding-left: 12px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .data-box { 
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--m-border);
            padding: 18px;
        }

        /* Form Elements */
        textarea, input[type="text"] { 
            background: #11141b; border: 1px solid var(--m-border); 
            color: var(--m-acid); font-family: monospace; padding: 12px;
            outline: none; transition: 0.2s;
        }
        textarea:focus, input:focus { border-color: var(--m-acid); background: #161a24; }

        /* Directives / Task List */
        .task-list { list-style: none; padding: 0; }
        .task-item { 
            display: flex; align-items: center; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem; font-weight: 600;
        }
        .task-item.completed { color: var(--m-acid); opacity: 0.4; }
        .checkbox { 
            width: 12px; height: 12px; border: 2px solid var(--m-acid); 
            margin-right: 15px; cursor: pointer; display: inline-block;
        }
        .completed .checkbox { background: var(--m-acid); }

        /* Data Navigator Blocks */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
        .sector-block { 
            background: var(--m-cobalt); color: white;
            border: none; padding: 12px; font-weight: 900; 
            transition: 0.2s; text-align: left;
        }
        .sector-block:hover { background: var(--m-acid); color: var(--m-black); transform: translateX(5px); }

        .it-chip { 
            background: #11141b; border: 1px solid var(--m-border);
            color: var(--m-acid); padding: 8px; font-weight: bold;
        }
        .it-chip:hover { border-color: var(--m-acid); background: var(--m-cobalt); color: white; }

        /* Buttons */
        .btn-ui { 
            background: var(--m-border); color: var(--m-white); 
            border: none; padding: 10px 15px;
            font-size: 0.65rem; font-weight: 900; cursor: pointer;
            letter-spacing: 1px; transition: 0.2s;
        }
        .btn-ui:hover { background: var(--m-acid); color: var(--m-black); }
        .btn-sync { background: var(--m-cobalt); color: white; }
        .btn-alert { background: var(--m-alert); color: white; }

        /* Log Viewer */
        #log-viewer { 
            background: #000; border: 1px dashed var(--m-acid); 
            padding: 20px; margin-top: 20px;
        }
        .view-header { color: var(--m-acid); font-weight: 900; margin-bottom: 10px; font-size: 0.8rem; }
        .view-body { color: var(--m-white); border-left: none; padding-left: 0; font-family: monospace; }

        .blink { animation: blinker 0.15s infinite alternate; }
        @keyframes blinker { from { opacity: 1; } to { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="sys-header">
            <div class="welcome-text">M-LOG // ITERATION_<span id="it-count">----</span></div>
            <div class="status-line">U-ECHO // <span id="sys-time">00:00:00</span></div>
        </div>

        <div class="inner-border">
            
            <div class="module">
                <div class="module-title" id="legacy-title">MOD 01 // Inherited_Echo</div>
                <div class="data-box" id="patch-notes-display" style="border-left: 2px solid var(--m-acid);">...</div>
            </div>

            <div class="module">
                <div class="module-title">MOD 02 // Active_Directives</div>
                <div class="data-box">
                    <ul class="task-list" id="todo-list"></ul>
                    <input type="text" id="new-task-input" placeholder=">> INPUT_NEW_DIRECTIVE" style="width:100%; margin-top:10px;">
                </div>
            </div>

            <div class="module">
                <div class="module-title" id="successor-title">MOD 03 // Handover_Sequence</div>
                <div class="data-box">
                    <textarea id="next-note" placeholder="COMPILE DATA FOR NEXT RUNNER..." rows="3" onkeyup="saveNote()" style="width:100%"></textarea>
                </div>
            </div>

            <div class="module">
                <div class="module-title">MOD 04 // Memory_Bank</div>
                <div class="data-box">
                    <div class="archive-grid" id="sector-grid"></div>
                    <div class="iteration-sub-grid" id="it-sub-grid"></div>

                    <div id="log-viewer">
                        <div class="view-header" id="view-id">LOG_DECRYPTED</div>
                        <div class="view-body" id="view-body">...</div>
                    </div>

                    <div style="margin-top:25px; display:flex; flex-wrap:wrap; gap:10px;">
                        <button class="btn-ui btn-sync" onclick="cloudPush()">Push_To_U-Echo</button>
                        <button class="btn-ui btn-sync" onclick="cloudPull()">Pull_From_Bank</button>
                        <button class="btn-ui" onclick="manualRollover()">Reset_Runner</button>
                        <button class="btn-ui" onclick="resetKeys()">Keys</button>
                        <button class="btn-ui btn-alert" onclick="purgeArchive()">Wipe_Local</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
    
    <script>
        const startDateString = "2004-10-15T00:00:00"; 
        let GIST_ID = localStorage.getItem('it_gist_id');
        let GIST_TOKEN = localStorage.getItem('it_gist_token');

        function checkCredentials() {
            if (!GIST_ID || !GIST_TOKEN) {
                GIST_ID = prompt("BANK_ID:");
                GIST_TOKEN = prompt("BANK_KEY:");
                if (GIST_ID && GIST_TOKEN) {
                    localStorage.setItem('it_gist_id', GIST_ID);
                    localStorage.setItem('it_gist_token', GIST_TOKEN);
                }
            }
        }

        function resetKeys() {
            if(confirm("UPDATE SYSTEM CREDENTIALS?")) {
                localStorage.removeItem('it_gist_id');
                localStorage.removeItem('it_gist_token');
                location.reload();
            }
        }

        let dayOffset = parseInt(localStorage.getItem('it_offset')) || 0;
        let tasks = JSON.parse(localStorage.getItem('it_tasks')) || [];
        let archive = JSON.parse(localStorage.getItem('it_archive')) || [];
        let currentIteration = 0;

        function initSystem() {
            checkCredentials();
            const start = new Date(startDateString);
            const now = new Date();
            currentIteration = Math.floor((now - start) / (1000 * 60 * 60 * 24)) + dayOffset;
            
            document.getElementById('it-count').innerText = currentIteration;
            document.getElementById('legacy-title').innerText = `MOD 01 // Echo_From [${currentIteration - 1}]`;
            document.getElementById('successor-title').innerText = `MOD 03 // Handover_To [${currentIteration + 1}]`;

            checkAutoRollover();
            renderTasks();
            renderSectors();
            
            document.getElementById('next-note').value = localStorage.getItem('it_draft') || "";
            setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        async function cloudPush() {
            if (!GIST_TOKEN || !GIST_ID) return;
            const data = { archive, tasks, patch: localStorage.getItem('it_patch') || "", offset: dayOffset, last_run: currentIteration };
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GIST_TOKEN}` },
                    body: JSON.stringify({ files: { "soul_backup.json": { content: JSON.stringify(data) } } })
                });
                if (response.ok) alert("SYNC_SUCCESSFUL");
            } catch (e) { alert("SYNC_ERROR"); }
        }

        async function cloudPull() {
            if (!GIST_TOKEN || !GIST_ID) return;
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { "Authorization": `token ${GIST_TOKEN}` }
                });
                const gist = await response.json();
                const data = JSON.parse(gist.files["soul_backup.json"].content);
                if (confirm("OVERWRITE LOCAL DATA?")) {
                    localStorage.setItem('it_archive', JSON.stringify(data.archive));
                    localStorage.setItem('it_tasks', JSON.stringify(data.tasks));
                    localStorage.setItem('it_patch', data.patch);
                    localStorage.setItem('it_offset', data.offset);
                    localStorage.setItem('it_last_run', data.last_run);
                    location.reload();
                }
            } catch (e) { alert("PULL_ERROR"); }
        }

        function checkAutoRollover() {
            let savedIter = parseInt(localStorage.getItem('it_last_run')) || currentIteration;
            if (currentIteration > savedIter) { performRollover(savedIter); }
            document.getElementById('patch-notes-display').innerText = localStorage.getItem('it_patch') || "SYSTEM_BOOT_INITIALIZED.";
        }

        function performRollover(iterToArchive) {
            let lastNote = localStorage.getItem('it_draft') || "";
            if (lastNote.trim() !== "") {
                archive.unshift({ id: iterToArchive, body: lastNote, date: new Date().toLocaleDateString('en-GB') });
                localStorage.setItem('it_archive', JSON.stringify(archive));
                localStorage.setItem('it_patch', lastNote);
            }
            localStorage.setItem('it_draft', "");
            tasks = tasks.map(t => ({ ...t, done: false }));
            localStorage.setItem('it_tasks', JSON.stringify(tasks));
            localStorage.setItem('it_last_run', currentIteration);
        }

        function manualRollover() {
            if(confirm("TERMINATE RUNNER SESSION?")) {
                performRollover(currentIteration);
                dayOffset++;
                localStorage.setItem('it_offset', dayOffset);
                location.reload();
            }
        }

        function renderSectors() {
            const grid = document.getElementById('sector-grid');
            grid.innerHTML = '';
            let sectors = {};
            archive.forEach(entry => {
                let sectorStart = Math.floor(entry.id / 100) * 100;
                let sectorKey = `${sectorStart}-${sectorStart + 99}`;
                if (!sectors[sectorKey]) sectors[sectorKey] = [];
                sectors[sectorKey].push(entry);
            });
            Object.keys(sectors).sort().reverse().forEach(key => {
                const div = document.createElement('div');
                div.className = 'sector-block';
                div.innerText = `SEC_${key}`;
                div.onclick = () => showIterationGrid(sectors[key]);
                grid.appendChild(div);
            });
        }

        function showIterationGrid(entries) {
            const itGrid = document.getElementById('it-sub-grid');
            itGrid.style.display = 'grid';
            itGrid.innerHTML = entries.map(e => `
                <div class="it-chip" onclick="decryptLog(${e.id})">
                    ${e.id}
                    <span class="it-date" style="display:block; font-size:0.5rem; opacity:0.6">${e.date}</span>
                </div>`).join('');
        }

        function decryptLog(id) {
            const viewer = document.getElementById('log-viewer');
            const entry = archive.find(e => e.id === id);
            if (entry) {
                viewer.style.display = 'block';
                document.getElementById('view-id').innerText = `MEMORY_BANK // ITERATION_${entry.id}`;
                document.getElementById('view-body').innerText = entry.body;
                viewer.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderTasks() {
            document.getElementById('todo-list').innerHTML = tasks.map((t, i) => `
                <li class="task-item ${t.done ? 'completed' : ''}">
                    <span class="checkbox" onclick="toggleTask(${i})"></span>
                    <span style="flex-grow:1">${t.text}</span>
                    <span style="cursor:pointer;color:var(--m-alert)" onclick="deleteTask(${i})">WIPE</span>
                </li>`).join('');
        }

        function addTask() {
            let input = document.getElementById('new-task-input');
            if (input.value.trim()) {
                tasks.push({ text: input.value.toUpperCase(), done: false });
                input.value = ''; saveTasks(); renderTasks();
            }
        }

        function toggleTask(i) { tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); }
        function deleteTask(i) { tasks.splice(i, 1); saveTasks(); renderTasks(); }
        function saveTasks() { localStorage.setItem('it_tasks', JSON.stringify(tasks)); }
        function saveNote() { localStorage.setItem('it_draft', document.getElementById('next-note').value); }
        function purgeArchive() { if(confirm("PURGE ALL LOCAL DATA?")) { localStorage.clear(); location.reload(); } }
        document.getElementById('new-task-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });

        initSystem();
    </script>
</body>
</html>
